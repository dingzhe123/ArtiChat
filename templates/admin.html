{{define "content"}}
<div class="admin-panel">
    <h2>📝 文章管理</h2>

    <div class="admin-layout">
        <!-- Form -->
        <div class="admin-form card">
            <h3 id="form-title">新建文章</h3>
            <form id="article-form">
                <input type="hidden" id="article-id">
                <div class="form-group">
                    <label for="title">标题</label>
                    <input type="text" id="title" class="form-input" placeholder="文章标题" required>
                </div>
                <div class="form-group">
                    <label for="author">作者</label>
                    <input type="text" id="author" class="form-input" placeholder="作者名" required>
                </div>
                <div class="form-group">
                    <label for="tags-input">标签（回车添加，逗号分隔）</label>
                    <div class="tags-wrapper" id="tags-wrapper">
                        <div id="tags-chips" class="tags-chips"></div>
                        <input type="text" id="tags-input" class="form-input" placeholder="输入标签后按回车">
                    </div>
                    <input type="hidden" id="tags" name="tags">
                </div>
                <div class="form-group">
                    <label for="content">内容（Markdown）
                        <span class="char-count" id="char-count">0 字</span>
                    </label>
                    <textarea id="content" class="form-input form-textarea" rows="15"
                        placeholder="支持 Markdown 格式：&#10;# 标题&#10;**加粗**&#10;- 列表&#10;`代码`" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">发布文章</button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;">取消编辑</button>
                </div>
            </form>
            <div id="form-msg" class="form-msg" style="display:none;"></div>
        </div>

        <!-- Article List -->
        <div class="admin-list card">
            <h3>已发布文章 <span class="count">({{len .Articles}})</span></h3>
            <div id="article-table-wrap">
                {{if .Articles}}
                <table class="article-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>作者</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{range .Articles}}
                        <tr data-id="{{.ID}}">
                            <td>{{.ID}}</td>
                            <td><a href="/articles/{{.ID}}" title="{{.Title}}">{{printf "%.30s" .Title}}</a></td>
                            <td>{{.Author}}</td>
                            <td>{{.CreatedAt.Format "2006-01-02"}}</td>
                            <td class="actions">
                                <button class="btn btn-small btn-edit" data-id="{{.ID}}">编辑</button>
                                <button class="btn btn-small btn-delete" data-id="{{.ID}}">删除</button>
                            </td>
                        </tr>
                        {{end}}
                    </tbody>
                </table>
                {{else}}
                <div class="empty-state">
                    <p>📝 暂无文章</p>
                    <p class="empty-hint">在左侧填写标题和内容，点击「发布文章」创建第一篇</p>
                </div>
                {{end}}
            </div>
        </div>
    </div>
</div>

<script src="/static/js/admin.js"></script>
{{end}}
